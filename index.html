<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aesthetic Weather</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Location Screen -->
<div id="locationScreen" class="center-screen">
    <h1>Welcome</h1>
    <button onclick="requestLocation()">Allow Location</button>
</div>

<!-- Main App -->
<div id="app" class="hidden">

    <video autoplay muted loop id="bgVideo"></video>
    <div class="overlay"></div>

    <div class="weather-ui">
        <h1 id="city"></h1>
        <h2 id="temp"></h2>
        <p id="condition"></p>
    </div>

    <button id="settingsBtn" onclick="toggleSettings()">⚙️</button>

    <div id="settingsPanel" class="settings hidden">
        <h3>Settings</h3>

        <label>Clovverr API Key</label>
        <input type="text" id="apiKeyInput">
        <button onclick="saveApiKey()">Save API Key</button>

        <hr>

        <label>Upload Custom Video</label>
        <select id="weatherTypeSelect">
            <option value="clear">Clear</option>
            <option value="rain">Rain</option>
            <option value="snow">Snow</option>
            <option value="clouds">Clouds</option>
            <option value="thunder">Thunder</option>
        </select>
        <input type="file" id="videoUpload" accept="video/*">
        <button onclick="saveCustomVideo()">Save Video</button>

        <hr>

        <label>
            <input type="checkbox" id="useCustom">
            Use Custom Videos
        </label>

        <label>
            <input type="checkbox" id="useApi">
            Use Clovverr API
        </label>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
